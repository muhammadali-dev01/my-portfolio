<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

  <form id="loginForm" class="border p-4 rounded shadow">
    <h2 class="mb-4">Student Login</h2>

    <!-- Email -->
    <label for="email" class="form-label">Email</label>
    <input type="email" id="email" class="form-control mb-3" required>
    <div class="invalid-feedback">Please enter a valid email address.</div>

    <!-- Password -->
    <label for="password" class="form-label">Password</label>
    <input type="password" id="password" class="form-control mb-3" required>
    <div class="invalid-feedback">Password is required.</div>

    <!-- Login Button -->
    <button type="submit" class="btn btn-primary w-100">Login</button>

    <p class="mt-3">
     Don’t have an account? <a href="signUpPage.html">Register here</a>
    </p>

  </form>

  <script>
    let emailInput = document.getElementById("email");
    let passwordInput = document.getElementById("password");
    let form = document.getElementById("loginForm");

    // Email regex pattern
    let emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/;

    // Validate email on input
    emailInput.addEventListener("input", function () {
      if (emailPattern.test(emailInput.value)) {
        emailInput.classList.remove("is-invalid");
        emailInput.classList.add("is-valid");
      } else {
        emailInput.classList.remove("is-valid");
        emailInput.classList.add("is-invalid");
      }
    });

    // Validate on form submit
    form.addEventListener("submit", function (event) {
      let valid = true;

      // Email check
      if (!emailPattern.test(emailInput.value)) {
        emailInput.classList.add("is-invalid");
        valid = false;
      }

      // Password check
      if (passwordInput.value.trim() === "") {
        passwordInput.classList.add("is-invalid");
        valid = false;
      } else {
        passwordInput.classList.remove("is-invalid");
        passwordInput.classList.add("is-valid");
      }

      if (!valid) {
        event.preventDefault(); // Stop submission if invalid
      }
    });
  </script>

</body>
</html>
