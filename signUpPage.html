<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration Form</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <style>
      #strengthBar {
        width: 100%;
        height: 8px;
        background: #ddd;
        margin-top: 5px;
      }
      #strengthFill {
        height: 100%;
        width: 0%;
        background: red;
      }
    </style>
  </head>

  <body class="container mt-5">
    <form id="signupForm" class="border p-4 rounded shadow">
      <h2 class="mb-4">Student Registration Form</h2>

      <!-- Full Name -->
      <label for="fullname" class="form-label">Full Name</label>
      <input type="text" id="fullname" class="form-control mb-3" required />

      <!-- Email -->
      <label for="email" class="form-label">Email</label>
      <input type="email" id="email" class="form-control mb-3" required />
      <div class="invalid-feedback">Please enter a valid email address.</div>

      <!-- Password -->
      <label for="password" class="form-label">Password</label>
      <input type="password" id="password" class="form-control mb-1" required />
      <div id="strengthBar"><div id="strengthFill"></div></div>

      <!-- Confirm Password -->
      <label for="confPassword" class="form-label mt-3">Confirm Password</label>
      <input
        type="password"
        id="confPassword"
        class="form-control mb-3"
        required
      />
      <div class="invalid-feedback">Passwords do not match.</div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary w-100">Submit</button>

      <p class="mt-3">
        Already registered? <a href="login page.html">Login here</a>
      </p>
    </form>

    <script>
      // Email validation
      let emailInput = document.getElementById("email");
      let emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/;

      emailInput.addEventListener("input", function () {
        if (emailPattern.test(emailInput.value)) {
          emailInput.classList.remove("is-invalid");
          emailInput.classList.add("is-valid");
        } else {
          emailInput.classList.remove("is-valid");
          emailInput.classList.add("is-invalid");
        }
      });

      // Password strength check
      let password = document.getElementById("password");
      let strengthFill = document.getElementById("strengthFill");

      password.addEventListener("input", function () {
        let value = password.value;
        let strength = 0;

        if (value.length >= 6) strength++;
        if (/[A-Z]/.test(value)) strength++;
        if (/[!@#$%^&*]/.test(value)) strength++;

        if (strength === 1) {
          strengthFill.style.width = "33%";
          strengthFill.style.background = "red";
        } else if (strength === 2) {
          strengthFill.style.width = "66%";
          strengthFill.style.background = "orange";
        } else if (strength === 3) {
          strengthFill.style.width = "100%";
          strengthFill.style.background = "green";
        } else {
          strengthFill.style.width = "0%";
        }
      });

      // Confirm password check
      let confPassword = document.getElementById("confPassword");
      let form = document.getElementById("signupForm");

      form.addEventListener("submit", function (event) {
        if (password.value !== confPassword.value) {
          event.preventDefault();
          confPassword.classList.add("is-invalid");
        } else {
          confPassword.classList.remove("is-invalid");
          confPassword.classList.add("is-valid");
        }
      });

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        // Perform validation checks here...
        if (
          password.value === confPassword.value &&
          emailPattern.test(emailInput.value)
        ) {
          alert("Signup successful! Redirecting to login page...");
          window.location.href = "loginPage.html"; // Redirect to login
        }
      });
    </script>
  </body>
</html>
