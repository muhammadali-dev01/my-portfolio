    <div class="p-40px">

        <form action="">
            <div>
                <h1 class="text-center text-secondry">Registration Form</h1>
            </div>

            <label for="firstName" class="form-label">First Name:</label>
            <input type="text" name="firstName" id="firstName" class="form-control" required>
            <br>
            <label for="lastName" class="form-label">Last Name:</label>
            <input type="text" name="lastName" id="lastName" class="form-control" required>
            <br>
            <label for="email" class="form-label">Email:</label>
            <input type="email" name="email" id="email" class="form-control" required>
            <br>
            <label for="phone" class="form-label">Phone No:</label>
            <input type="tel" name="phone" id="phone" class="form-control" required>
            <br>
            <label for="country" class="form-label">Country</label>
            <select id="country" name="country" class=" form-control">
                <option class="dropdown-item" value="#">--------Select Country--------</option>
                <option class="dropdown-item" value="canada">Pkistan</option>
                <option class="dropdown-item" value="usa">USA</option>
                <option class="dropdown-item" value="canada">canada</option>
                <option class="dropdown-item" value="australia">Australia</option>
                <option class="dropdown-item" value="sirilanka">Sirilanka</option>
                <option class="dropdown-item" value="afganistan">Afganistan</option>
            </select>
              <br>
              <label for="city" class="form-label">City:</label>
            <select id="city" name="city" class=" form-control">
                <option class="dropdown-item" value="#">--------Select City--------</option>
                <option class="dropdown-item" value="lahore">lahore</option>
                <option class="dropdown-item" value="Islamabad">Islamabad</option>
                <option class="dropdown-item" value="Faslabad">Faslabad</option>
                <option class="dropdown-item" value="Peshawar">Peshawar</option>
                <option class="dropdown-item" value="Sialkott">Sialkott</option>
                <option class="dropdown-item" value="Sindh">Sindh</option>
            </select>
              <br>
            <label for="age" class="form-label">Age:</label>
            <input type="number" name="age" id="age" class="form-control" required>
            <br>
            <div class="mb-3">
                <label class="form-label d-block">Gender</label>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" value="male">
                    <label class="form-check-label">Male</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" value="female">
                    <label class="form-check-label">Female</label>
                </div>

            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-shine bg-warning">Register</button>
            </div>

        </form>
